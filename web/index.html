<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">音量控制</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <button id="lang-btn" class="lang-btn">EN</button>
            </div>
            <h1 data-i18n="header">音频控制</h1>
            <p class="subtitle" data-i18n="subtitle">Windows Web 控制器</p>
        </header>

        <section class="master-control glass-panel">
            <div class="header-row">
                <h2 data-i18n="master_vol">主音量</h2>
                <button id="master-mute-btn" class="icon-btn" aria-label="Mute">
                    <svg id="master-icon-vol" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    <svg id="master-icon-mute" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                </button>
            </div>
            <div class="slider-container">
                <input type="range" id="master-slider" min="0" max="100" value="50" class="slider master-slider">
                <span id="master-val" class="val-text">50%</span>
            </div>
        </section>

        <h3 class="section-title" data-i18n="media_title">播放控制</h3>
        <section class="media-control glass-panel">
            <div id="media-info" class="media-info-display" style="display: none;">
                <div class="media-text">
                    <div id="media-title" class="media-title">Not Playing</div>
                    <div id="media-artist" class="media-artist"></div>
                </div>
            </div>
            <div class="media-btns">
                <button id="media-prev" class="media-btn" aria-label="Previous">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 19 2 12 11 5 11 19"></polygon><polygon points="22 19 13 12 22 5 22 19"></polygon></svg>
                </button>
                <button id="media-play-pause" class="media-btn play-pause" aria-label="Play/Pause">
                    <div class="play-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </div>
                    <div class="pause-icon" style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                    </div>
                </button>
                <button id="media-next" class="media-btn" aria-label="Next">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></svg>
                </button>
            </div>
        </section>

        <h3 class="section-title" data-i18n="apps_title">应用音量</h3>
        <div id="sessions-container" class="sessions-list">
            <div class="loading-state" data-i18n="loading">正在读取音频应用...</div>
        </div>
    </div>

    <!-- Template for a session card -->
    <template id="session-template">
        <div class="session-card glass-panel">
            <div class="session-info">
                <div class="app-icon"></div>
                <div class="app-details">
                    <h4 class="app-name"></h4>
                    <p class="app-pid"></p>
                </div>
                <button class="icon-btn mute-btn" aria-label="Mute">
                    <svg class="icon-vol" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    <svg class="icon-mute" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                </button>
            </div>
            <div class="slider-container session-slider-container">
                <input type="range" min="0" max="100" value="50" class="slider app-slider">
                <span class="val-text app-val-text">50%</span>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
